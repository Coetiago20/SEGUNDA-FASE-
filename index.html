<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Polla Mundialista 26 · Fase 2</title>
<style>
  :root{--granate:#8E1B3A;--granate-osc:#6E1430;--dorado:#E7B23B;--crema:#F6F0E2;--crema-osc:#ECE2CB;--tinta:#241019;--gris:#8A7F74;--linea:#D9CBB0;--r:16px;--tap:60px}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;background:var(--crema);color:var(--tinta);font-size:18px;line-height:1.4;-webkit-font-smoothing:antialiased}
  header{position:sticky;top:0;z-index:20;background:var(--granate);color:var(--crema);padding:14px 18px 12px;box-shadow:0 2px 10px rgba(0,0,0,.18)}
  .brand{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand b{font-size:18px;letter-spacing:.5px}
  .brand .anker{font-size:11px;opacity:.85;font-weight:700;letter-spacing:1.5px}
  .progress{margin-top:10px}
  .pbar{height:10px;background:var(--granate-osc);border-radius:99px;overflow:hidden}
  .pfill{height:100%;width:0%;background:var(--dorado);transition:width .35s ease}
  .pstep{margin-top:6px;font-size:13px;opacity:.95;display:flex;justify-content:space-between;align-items:center}
  main{padding:20px 16px 130px;max-width:560px;margin:0 auto}
  h1{font-size:25px;line-height:1.15;margin:.2em 0 .15em}
  .lead{color:#5b4a3f;font-size:16px;margin:0 0 18px}
  .eyebrow{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--granate);text-transform:uppercase}
  .rounddate{background:#fff;border:1px solid var(--linea);border-left:6px solid var(--granate);border-radius:10px;padding:10px 12px;font-weight:700;font-size:15px;margin:0 0 14px;color:var(--granate-osc)}
  .match{background:#fff;border:1px solid var(--linea);border-radius:var(--r);padding:10px;margin:0 0 14px}
  .mhead{display:flex;align-items:center;gap:8px;padding:2px 2px 10px;font-size:13px;font-weight:800;color:#5b4a3f}
  .mhead .dot{width:14px;height:14px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 2px rgba(0,0,0,.06)}
  .match .vs{text-align:center;font-size:12px;color:var(--gris);font-weight:700;margin:6px 0;letter-spacing:1px}
  .team{width:100%;min-height:var(--tap);display:flex;align-items:center;gap:14px;padding:10px 14px;border:2px solid var(--crema-osc);border-radius:12px;background:var(--crema);color:var(--tinta);font-size:19px;font-weight:600;cursor:pointer;transition:all .12s ease;text-align:left}
  .team img{width:38px;height:26px;object-fit:cover;border-radius:4px;box-shadow:0 0 0 1px rgba(0,0,0,.08);flex:0 0 auto}
  .team .nm{flex:1}
  .team .chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--linea);flex:0 0 auto;display:grid;place-items:center;color:transparent;font-weight:900}
  .team:active{transform:scale(.99)}
  .team.sel{background:var(--granate);color:#fff;border-color:var(--granate-osc)}
  .team.sel .chk{background:var(--dorado);border-color:var(--dorado);color:var(--granate-osc)}
  .field label{display:block;font-weight:700;margin:0 0 8px;font-size:17px}
  select,input[type=text],input[type=tel]{width:100%;min-height:var(--tap);font-size:18px;padding:12px 14px;border:2px solid var(--linea);border-radius:12px;background:#fff;color:var(--tinta)}
  .hint{font-size:14px;color:#5b4a3f;margin:8px 0 0}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .pick{min-height:var(--tap);display:flex;align-items:center;gap:10px;padding:10px;border:2px solid var(--crema-osc);border-radius:12px;background:var(--crema);cursor:pointer;font-size:16px;font-weight:600}
  .pick img{width:30px;height:21px;object-fit:cover;border-radius:3px;box-shadow:0 0 0 1px rgba(0,0,0,.08)}
  .pick .pts{margin-left:auto;font-size:12px;color:var(--granate);font-weight:800;white-space:nowrap}
  .pick.sel{background:var(--granate);color:#fff;border-color:var(--granate-osc)}
  .pick.sel .pts{color:var(--dorado)}
  .crown{display:grid;place-items:center;gap:8px;padding:14px;background:#fff;border:1px dashed var(--dorado);border-radius:var(--r);margin-bottom:14px}
  .crown .t{font-size:13px;font-weight:800;letter-spacing:1.5px;color:var(--granate)}
  .crown .who{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800}
  .crown img{width:42px;height:29px;object-fit:cover;border-radius:4px}
  .review h3{margin:18px 0 6px;font-size:15px;color:var(--granate);letter-spacing:.5px}
  .rrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--linea);font-size:16px}
  .rrow img{width:26px;height:18px;object-fit:cover;border-radius:3px}
  .rrow .lab{color:var(--gris);width:92px;flex:0 0 auto;font-size:13px}
  .seellave{width:100%;min-height:52px;margin:6px 0 18px;background:#fff;border:2px solid var(--dorado);color:var(--granate);border-radius:12px;font-weight:800;font-size:16px;cursor:pointer}
  #overlay{position:fixed;inset:0;z-index:50;background:var(--tinta);display:none;flex-direction:column}
  #overlay.on{display:flex}
  .ovhead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--granate);color:#fff;flex:0 0 auto}
  .ovhead b{font-size:16px;letter-spacing:.5px}
  .ovclose{background:var(--dorado);color:var(--granate-osc);border:none;border-radius:99px;font-weight:800;padding:8px 16px;font-size:15px;cursor:pointer}
  .ovhint{color:var(--crema);opacity:.7;font-size:12px;text-align:center;padding:6px;flex:0 0 auto}
  .bracket{flex:1 1 auto;display:flex;align-items:flex-start;overflow:auto;padding:0 18px 40px;-webkit-overflow-scrolling:touch}
  .bround{display:flex;flex-direction:column;flex:0 0 auto;min-width:158px}
  .brt{position:sticky;top:0;z-index:2;background:var(--tinta);height:38px;display:flex;flex-direction:column;justify-content:center;align-items:center;color:var(--dorado);font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
  .brt small{color:#b9a9b0;font-weight:600;font-size:10px;letter-spacing:0;text-transform:none}
  .bmatch{position:relative;height:72px;box-sizing:border-box;display:flex;flex-direction:column;gap:3px;justify-content:center;border-left:3px solid #3a2630;padding-left:7px}
  .bcell{display:flex;align-items:center;gap:6px;background:#2c1b24;color:#cdbfc6;border:1px solid #3a2630;border-radius:6px;padding:3px 7px;font-size:12px;font-weight:700;white-space:nowrap}
  .bcell img{width:18px;height:12px;object-fit:cover;border-radius:2px;flex:0 0 auto}
  .bcell.win{background:var(--granate);color:#fff;border-color:var(--dorado)}
  .bcell.empty{justify-content:center;color:#6a5560}
  .bdate{font-size:9px;color:#9a8a91;white-space:nowrap;display:flex;align-items:center;gap:4px}
  .bdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:0 0 auto}
  .bstub{position:absolute;right:-16px;top:50%;width:16px;height:2px;background:#5a4450}
  .bvert{position:absolute;right:-16px;width:2px;background:#5a4450;top:50%}
  .bchamp{margin:14px 8px;background:var(--dorado);color:var(--granate-osc);border-radius:10px;padding:10px 12px;font-weight:900;font-size:15px;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .bchamp img{width:26px;height:18px;object-fit:cover;border-radius:3px}
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(246,240,226,.96);backdrop-filter:blur(6px);border-top:1px solid var(--linea);padding:12px 16px;display:flex;gap:12px;max-width:560px;margin:0 auto}
  .btn{flex:1;min-height:var(--tap);border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer;letter-spacing:.3px}
  .btn.prim{background:var(--granate);color:#fff}
  .btn.prim:disabled{background:#c9b8b0;color:#fff}
  .btn.ghost{background:transparent;color:var(--granate);border:2px solid var(--granate);flex:0 0 38%}
  .btn.gold{background:var(--dorado);color:var(--granate-osc)}
  .center{text-align:center;padding:30px 10px}
  .big{font-size:60px;line-height:1;margin-bottom:10px}
  .spin{width:44px;height:44px;border:5px solid var(--crema-osc);border-top-color:var(--granate);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 16px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .pill{display:inline-block;background:var(--granate);color:#fff;border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
  <header>
    <div class="brand"><b>POLLA MUNDIALISTA 26</b><span class="anker">⚡ ANKER</span></div>
    <div class="progress"><div class="pbar"><div class="pfill" id="pfill"></div></div>
      <div class="pstep"><span id="pname">Bienvenida</span><span id="pcount"></span></div></div>
  </header>
  <main id="app"></main>
  <div class="nav" id="nav">
    <button class="btn ghost" id="back">Atrás</button>
    <button class="btn prim" id="next">Siguiente</button>
  </div>
  <div id="overlay">
    <div class="ovhead"><b>🗺️ Rumbo a la final</b><button class="ovclose" onclick="closeBracket()">Cerrar ✕</button></div>
    <div class="ovhint">Desliza ↔ y ↕ para ver todas las rondas. Tus elecciones llenan el cuadro.</div>
    <div id="bracketBox" style="display:flex;flex:1 1 auto;overflow:hidden"></div>
  </div>

<script>
/* ===================== CONFIG ===================== */
const API_URL = "PEGAR_AQUI_LA_URL_DEL_WEB_APP";

const PARTICIPANTES = [
"John Alex Sandoval","Christian Torres","Jorge Emilio Reyes","Jaime Andrés Villamizar Hernández","Martin Trejos","Carlos Rios","Juan Carlos Castro Torres","Edwin Alarcon Martinez","Guillermo Triana","Hector Enrique Leon Vivas","Juan Pablo Sanchez","Miguel Angel Caicedo Camelo","Andres Malagon","Luis Hernan Ibañez","Carlos Gil","Paula Portilla","Camilo Niño","Santiago Corredor Ortiz","Ocalice Rojas","Brayan Estevez","Felix Gordillo","Nicolás Torres","Sandra Milena Sanabria Macana","Harvey Gamma","Oscar Garzon","Paola Rodriguez","Diego Reyes","Ingrid Vera Gallego","Sandra Ortiz","Ivan Navarro","Juan Manuel Vargas","Jorge Sepulveda Rios","Omar Eduardo Gonzales Sanchez","Camila Nieto","Camilo Nieto","Ximena Martinez","Daniel Velandia","Pedro Fresneda Ramirez","Zula Corredor","Sandra Ravagli Castillo","Oscar Garcia","Nevardo Bonces","Fabian Alexander Rodriguez Gallo","Mónica Escobar Carreño","Cristian Nieto","Fernando Riaño","Yani Farid Cruz Molina","Camilo Rodriguez","Danilo Rincon Gonzalez","Gonzalo Gonzales","Juan Blanco","Fernando Rodriguez","Joaquin Muñoz Bautista","Santiago Uribe","Stella Corredor","Jonathan Figueroa","Norberto Ariza","Milton Moreno","Edgar Cadena"
];

const PAL=["#E63946","#F4A261","#E9C46A","#2A9D8F","#457B9D","#6A4C93","#8AB17D","#BC6C25","#1D7874","#9B2226","#3D5A80","#C9184A","#588157","#6930C3","#0077B6","#BB3E03"];
const T=(name,code,com,ab)=>({name,code,com,ab});

/* 16AVOS — CUADRO OFICIAL FIFA (orden de árbol M73–M88). Hora Bogotá final. */
const R32=[
 {p:[T("Alemania","de",2,"ALE"),    T("Paraguay","py",6,"PAR")],     color:PAL[0], fecha:"Lun 29 jun · 3:30 p.m."},   /*M74*/
 {p:[T("Francia","fr",2,"FRA"),     T("Suecia","se",6,"SUE")],       color:PAL[1], fecha:"Mar 30 jun · 4:00 p.m."},   /*M77*/
 {p:[T("Sudáfrica","za",8,"RSA"),   T("Canadá","ca",5,"CAN")],       color:PAL[2], fecha:"Dom 28 jun · 2:00 p.m."},   /*M73*/
 {p:[T("Países Bajos","nl",2,"NED"),T("Marruecos","ma",2,"MAR")],    color:PAL[3], fecha:"Lun 29 jun · 8:00 p.m."},   /*M75*/
 {p:[T("Portugal","pt",2,"POR"),    T("Croacia","hr",2,"CRO")],      color:PAL[4], fecha:"Jue 2 jul · 6:00 p.m."},    /*M83*/
 {p:[T("España","es",2,"ESP"),      T("Austria","at",4,"AUT")],      color:PAL[5], fecha:"Jue 2 jul · 2:00 p.m."},    /*M84*/
 {p:[T("USA","us",2,"USA"),         T("Bosnia","ba",9,"BIH")],       color:PAL[6], fecha:"Mié 1 jul · 7:00 p.m."},    /*M81*/
 {p:[T("Bélgica","be",2,"BEL"),     T("Senegal","sn",2,"SEN")],      color:PAL[7], fecha:"Mié 1 jul · 3:00 p.m."},    /*M82*/
 {p:[T("Brasil","br",2,"BRA"),      T("Japón","jp",3,"JPN")],        color:PAL[8], fecha:"Lun 29 jun · 12:00 m."},    /*M76*/
 {p:[T("Costa de Marfil","ci",6,"CIV"),T("Noruega","no",5,"NOR")],   color:PAL[9], fecha:"Mar 30 jun · 12:00 m."},    /*M78*/
 {p:[T("México","mx",2,"MEX"),      T("Ecuador","ec",4,"ECU")],      color:PAL[10],fecha:"Mar 30 jun · 8:00 p.m."},   /*M79*/
 {p:[T("Inglaterra","gb-eng",2,"ENG"),T("RD Congo","cd",7,"COD")],   color:PAL[11],fecha:"Mié 1 jul · 11:00 a.m."},   /*M80*/
 {p:[T("Argentina","ar",2,"ARG"),   T("Cabo Verde","cv",9,"CPV")],   color:PAL[12],fecha:"Vie 3 jul · 5:00 p.m."},    /*M86*/
 {p:[T("Australia","au",4,"AUS"),   T("Egipto","eg",5,"EGY")],       color:PAL[13],fecha:"Vie 3 jul · 1:00 p.m."},    /*M88*/
 {p:[T("Suiza","ch",3,"SUI"),       T("Argelia","dz",4,"ALG")],      color:PAL[14],fecha:"Jue 2 jul · 10:00 p.m."},   /*M85*/
 {p:[T("Colombia","co",2,"COL"),    T("Ghana","gh",10,"GHA")],       color:PAL[15],fecha:"Vie 3 jul · 8:30 p.m."}     /*M87*/
];
const r32pairs=()=>R32.map(m=>m.p);

/* Rondas siguientes — color + fecha/hora Bogotá FINALES (árbol M89–M104). */
const R16META=[
 {color:PAL[0],fecha:"Sáb 4 jul · 4:00 p.m."},  {color:PAL[1],fecha:"Sáb 4 jul · 12:00 m."},
 {color:PAL[2],fecha:"Lun 6 jul · 2:00 p.m."},  {color:PAL[3],fecha:"Lun 6 jul · 7:00 p.m."},
 {color:PAL[4],fecha:"Dom 5 jul · 3:00 p.m."},  {color:PAL[5],fecha:"Dom 5 jul · 7:00 p.m."},
 {color:PAL[6],fecha:"Mar 7 jul · 11:00 a.m."}, {color:PAL[7],fecha:"Mar 7 jul · 3:00 p.m."}
];
const R8META=[
 {color:PAL[8],fecha:"Jue 9 jul · 3:00 p.m."},  {color:PAL[9],fecha:"Vie 10 jul · 2:00 p.m."},
 {color:PAL[10],fecha:"Sáb 11 jul · 4:00 p.m."},{color:PAL[11],fecha:"Sáb 11 jul · 8:00 p.m."}
];
const R4META=[{color:PAL[12],fecha:"Mar 14 jul · 2:00 p.m."},{color:PAL[13],fecha:"Mié 15 jul · 2:00 p.m."}];
const FINALMETA={color:PAL[14],fecha:"Dom 19 jul · 2:00 p.m. (Bogotá)"};
const TERMETA={color:PAL[15],fecha:"Sáb 18 jul · 4:00 p.m."};
const RONDAS={oct:"🗓️ Octavos · 4–7 jul (Bogotá)",cua:"🗓️ Cuartos · 9–11 jul (Bogotá)",sem:"🗓️ Semifinal · 14–15 jul (Bogotá)"};

/* ===================== MOTOR ===================== */
const flag=c=>c?`https://flagcdn.com/w160/${c}.png`:"";
const STORE="pollaF2_final";
const state={step:0,nombre:"",contacto:"",comodin:null,r32:Array(16).fill(null),r16:Array(8).fill(null),r8:Array(4).fill(null),r4:Array(2).fill(null),campeon:null,tercero:null};
try{const s=JSON.parse(localStorage.getItem(STORE));if(s)Object.assign(state,s);}catch(e){}
function save(){try{localStorage.setItem(STORE,JSON.stringify(state))}catch(e){}}

const winners=(pairs,picks)=>pairs.map((p,i)=>picks[i]==null?null:p[picks[i]]);
function r16pairs(){const w=winners(r32pairs(),state.r32);return [[w[0],w[1]],[w[2],w[3]],[w[4],w[5]],[w[6],w[7]],[w[8],w[9]],[w[10],w[11]],[w[12],w[13]],[w[14],w[15]]];}
function r8pairs(){const w=state.r16.map((s,i)=>s==null?null:r16pairs()[i][s]);return [[w[0],w[1]],[w[2],w[3]],[w[4],w[5]],[w[6],w[7]]];}
function r4pairs(){const w=state.r8.map((s,i)=>s==null?null:r8pairs()[i][s]);return [[w[0],w[1]],[w[2],w[3]]];}
function finalists(){return state.r4.map((s,i)=>s==null?null:r4pairs()[i][s]);}
function semiLosers(){return state.r4.map((s,i)=>s==null?null:r4pairs()[i][s==0?1:0]);}
const qualified=()=>{const a=[];R32.forEach(m=>m.p.forEach(t=>{if(t.code)a.push(t)}));return a;};

const steps=[
 {name:"Bienvenida",render:welcome,valid:()=>true},
 {name:"Tu nombre",render:nameStep,valid:()=>state.nombre.trim().length>0},
 {name:"Comodín",render:comodinStep,valid:()=>!!state.comodin},
 {name:"16avos",render:()=>roundStep("16avos de final","2 pts por acierto",r32pairs(),state.r32,R32,null),valid:()=>state.r32.every(x=>x!=null)},
 {name:"Octavos",render:()=>roundStep("Octavos de final","4 pts por acierto",r16pairs(),state.r16,R16META,RONDAS.oct),valid:()=>state.r16.every(x=>x!=null)},
 {name:"Cuartos",render:()=>roundStep("Cuartos de final","8 pts por acierto",r8pairs(),state.r8,R8META,RONDAS.cua),valid:()=>state.r8.every(x=>x!=null)},
 {name:"Semifinal",render:()=>roundStep("Semifinal","16 pts por acierto",r4pairs(),state.r4,R4META,RONDAS.sem),valid:()=>state.r4.every(x=>x!=null)},
 {name:"Final",render:finalStep,valid:()=>state.campeon!=null},
 {name:"3er puesto",render:terceroStep,valid:()=>state.tercero!=null},
 {name:"Revisar",render:reviewStep,valid:()=>true}
];

function welcome(){
 return `<p class="eyebrow">Fase 2 · Eliminación directa</p><h1>Arma tu camino al título</h1>
 <p class="lead">Elige quién pasa en cada ronda —de 16avos al campeón— y tu <b>equipo comodín</b>. Cada partido trae color, fecha y hora (Bogotá). Toma 3–4 min y puedes corregir hasta el cierre.</p>
 <button class="seellave" onclick="openBracket()">🗺️ Ver la llave del torneo</button>
 <div class="match" style="padding:16px">
  <div class="rrow" style="border:0"><span class="lab">Cierre</span><b>Mañana 1:00 PM (Bogotá)</b></div>
  <div class="rrow" style="border:0"><span class="lab">Comodín</span>Suma puntos extra por cada ronda que avance</div>
  <div class="rrow" style="border:0"><span class="lab">Premio 1°</span>60% del pozo + parlante Boom 3i</div>
 </div>`;
}
function nameStep(){
 const opts=PARTICIPANTES.map(n=>`<option ${n===state.nombre?'selected':''}>${n}</option>`).join("");
 return `<p class="eyebrow">Paso 1</p><h1>¿Quién eres?</h1>
 <div class="field"><label>Busca y elige tu nombre</label>
 <select id="nameSel"><option value="">— Selecciona tu nombre —</option>${opts}<option value="__otro">Mi nombre no aparece…</option></select>
 <div id="otroWrap" style="display:none;margin-top:12px"><label>Escribe tu nombre completo</label><input type="text" id="otroName" placeholder="Nombre y apellido"></div>
 <p class="hint">El celular es opcional. Sirve para identificarte si necesitas corregir.</p>
 <input type="tel" id="contacto" placeholder="Celular (opcional)" value="${state.contacto||''}" style="margin-top:8px"></div>`;
}
function comodinStep(){
 const teams=qualified().sort((a,b)=>a.name.localeCompare(b.name));
 const cards=teams.map(t=>`<div class="pick ${state.comodin&&state.comodin.name===t.name?'sel':''}" data-com='${t.code}'><img src="${flag(t.code)}" alt=""><span>${t.name}</span><span class="pts">+${t.com}/ronda</span></div>`).join("");
 return `<p class="eyebrow">Paso 2</p><h1>Elige tu comodín</h1>
 <p class="lead">Solo equipos que <b>clasificaron a 16avos</b>. Suma sus puntos por <b>cada ronda</b> que avance. Los menos favoritos pagan más.</p>
 <div class="grid">${cards}</div>`;
}
function roundStep(title,sub,pairs,picks,metas,roundDate){
 const head=roundDate?`<div class="rounddate">${roundDate}</div>`:"";
 const html=pairs.map((p,i)=>{
  if(!p[0]||!p[1])return "";
  const meta=metas?metas[i]:null;
  const stripe=meta?`style="border:1px solid var(--linea);border-left:6px solid ${meta.color}"`:"";
  const mh=meta?`<div class="mhead"><span class="dot" style="background:${meta.color}"></span><span>🕒 ${meta.fecha}</span></div>`:"";
  const t=(k)=>`<button class="team ${picks[i]===k?'sel':''}" data-m="${i}" data-k="${k}"><img src="${flag(p[k].code)}" alt=""><span class="nm">${p[k].name}</span><span class="chk">✓</span></button>`;
  return `<div class="match" ${stripe}>${mh}${t(0)}<div class="vs">— elige quién pasa —</div>${t(1)}</div>`;
 }).join("");
 return `<p class="eyebrow">${sub}</p><h1>${title}</h1>${head}<button class="seellave" onclick="openBracket()">🗺️ Ver llave completa</button>${html}`;
}
function finalStep(){
 const f=finalists();
 if(!f[0]||!f[1])return `<h1>Final</h1><p class="lead">Completa la semifinal primero.</p>`;
 const t=(k)=>`<button class="team ${state.campeon===k?'sel':''}" data-fin="${k}"><img src="${flag(f[k].code)}" alt=""><span class="nm">${f[k].name}</span><span class="chk">✓</span></button>`;
 const mh=`<div class="mhead"><span class="dot" style="background:${FINALMETA.color}"></span><span>🕒 ${FINALMETA.fecha}</span></div>`;
 let crown="";
 if(state.campeon!=null){const c=f[state.campeon];crown=`<div class="crown"><div class="t">🏆 CAMPEÓN · 50 PTS</div><div class="who"><img src="${flag(c.code)}">${c.name}</div></div>`;}
 return `<p class="eyebrow">La gran final · Campeón 50 · Subcampeón 36</p><h1>¿Quién levanta la copa?</h1>${crown}<div class="match" style="border-left:6px solid ${FINALMETA.color}">${mh}${t(0)}<div class="vs">— campeón —</div>${t(1)}</div>`;
}
function terceroStep(){
 const l=semiLosers();
 if(!l[0]||!l[1])return `<h1>Tercer puesto</h1><p class="lead">Completa la semifinal primero.</p>`;
 const t=(k)=>`<button class="team ${state.tercero===k?'sel':''}" data-ter="${k}"><img src="${flag(l[k].code)}" alt=""><span class="nm">${l[k].name}</span><span class="chk">✓</span></button>`;
 const mh=`<div class="mhead"><span class="dot" style="background:${TERMETA.color}"></span><span>🕒 ${TERMETA.fecha}</span></div>`;
 return `<p class="eyebrow">Tercer puesto · 28 pts · Cuarto · 20 pts</p><h1>El partido por el bronce</h1>
 <p class="lead">Entre los dos que perdieron en semifinal, ¿quién gana el tercer puesto?</p><div class="match" style="border-left:6px solid ${TERMETA.color}">${mh}${t(0)}<div class="vs">— tercer puesto —</div>${t(1)}</div>`;
}
function reviewStep(){
 const f=finalists(),l=semiLosers();
 const camp=state.campeon!=null?f[state.campeon]:null,sub=state.campeon!=null?f[state.campeon?0:1]:null,ter=state.tercero!=null?l[state.tercero]:null;
 const row=(lab,t)=>t?`<div class="rrow"><span class="lab">${lab}</span><img src="${flag(t.code)}">${t.name}</div>`:"";
 return `<p class="eyebrow">Último paso</p><h1>Revisa y envía</h1>
 <button class="seellave" onclick="openBracket()">🗺️ Ver mi llave completa</button>
 <div class="review"><div class="rrow"><span class="lab">Nombre</span><b>${state.nombre}</b></div>${row("Comodín",state.comodin)}${row("🏆 Campeón",camp)}${row("Subcampeón",sub)}${row("🥉 Tercero",ter)}</div>
 <p class="hint" style="margin-top:16px">Al enviar, tu pronóstico queda registrado. Puedes reenviar para corregir hasta el cierre.</p>`;
}

/* ---------- Llave ---------- */
const SLOT=72;
function bcell(t,win){if(!t)return `<div class="bcell empty">—</div>`;return `<div class="bcell ${win?'win':''}"><img src="${flag(t.code)}"><span>${t.ab||t.name}</span></div>`;}
function bcol(title,sub,pairs,picks,metas,r,last){
 const mv=SLOT*(Math.pow(2,r)-1)/2;
 const m=pairs.map((p,i)=>{
  const meta=metas?metas[i]:null;
  const c=meta?meta.color:"#3a2630";
  const d=meta?`<div class="bdate"><span class="bdot" style="background:${meta.color}"></span>${meta.fecha}</div>`:"";
  const stub=last?"":`<span class="bstub"></span>`;
  const vert=(!last&&i%2===0)?`<span class="bvert" style="height:${SLOT*Math.pow(2,r)}px"></span>`:"";
  return `<div class="bmatch" style="margin:${mv}px 16px;border-left-color:${c}">${bcell(p[0],picks[i]===0)}${bcell(p[1],picks[i]===1)}${d}${stub}${vert}</div>`;
 }).join("");
 return `<div class="bround"><div class="brt">${title}<small>${sub||""}</small></div>${m}</div>`;
}
function bracketHTML(){
 const f=finalists();let h=`<div class="bracket">`;
 h+=bcol("16avos","28 jun–3 jul",r32pairs(),state.r32,R32,0,false);
 h+=bcol("Octavos","4–7 jul",r16pairs(),state.r16,R16META,1,false);
 h+=bcol("Cuartos","9–11 jul",r8pairs(),state.r8,R8META,2,false);
 h+=bcol("Semis","14–15 jul",r4pairs(),state.r4,R4META,3,false);
 let fin=`<div class="bround"><div class="brt">Final<small>19 jul</small></div><div class="bmatch" style="margin:${SLOT*15/2}px 16px;border-left-color:${FINALMETA.color}">${bcell(f[0],state.campeon===0)}${bcell(f[1],state.campeon===1)}<div class="bdate"><span class="bdot" style="background:${FINALMETA.color}"></span>19 jul · 2:00 p.m.</div></div>`;
 if(state.campeon!=null){const c=f[state.campeon];if(c)fin+=`<div class="bchamp">🏆 <img src="${flag(c.code)}">${c.name}</div>`;}
 fin+=`</div>`;
 return h+fin+`</div>`;
}
function openBracket(){document.getElementById("bracketBox").innerHTML=bracketHTML();document.getElementById("overlay").classList.add("on");}
function closeBracket(){document.getElementById("overlay").classList.remove("on");}

/* ---------- Interacción ---------- */
const appEl=document.getElementById("app");
function paint(scrollTop){
 const s=steps[state.step];appEl.innerHTML=s.render();
 document.getElementById("pname").textContent=s.name;
 document.getElementById("pcount").textContent=`Paso ${state.step+1} de ${steps.length}`;
 document.getElementById("pfill").style.width=`${state.step/(steps.length-1)*100}%`;
 document.getElementById("back").style.visibility=state.step===0?"hidden":"visible";
 const next=document.getElementById("next");
 next.textContent=state.step===steps.length-1?"Enviar pronóstico":"Siguiente";
 next.className="btn "+(state.step===steps.length-1?"gold":"prim");
 next.disabled=!s.valid();
 bind();
 if(scrollTop!==false)window.scrollTo(0,0);
}
function bind(){
 appEl.querySelectorAll(".team[data-m]").forEach(b=>b.onclick=()=>{
  const m=+b.dataset.m,k=+b.dataset.k,nm=steps[state.step].name;
  if(nm==="16avos"){state.r32[m]=k;state.r16=Array(8).fill(null);state.r8=Array(4).fill(null);state.r4=Array(2).fill(null);state.campeon=null;state.tercero=null;}
  else if(nm==="Octavos"){state.r16[m]=k;state.r8=Array(4).fill(null);state.r4=Array(2).fill(null);state.campeon=null;state.tercero=null;}
  else if(nm==="Cuartos"){state.r8[m]=k;state.r4=Array(2).fill(null);state.campeon=null;state.tercero=null;}
  else if(nm==="Semifinal"){state.r4[m]=k;state.campeon=null;state.tercero=null;}
  refresh();
 });
 appEl.querySelectorAll(".pick[data-com]").forEach(b=>b.onclick=()=>{state.comodin=qualified().find(t=>t.code===b.dataset.com)||null;refresh();});
 appEl.querySelectorAll("[data-fin]").forEach(b=>b.onclick=()=>{state.campeon=+b.dataset.fin;refresh();});
 appEl.querySelectorAll("[data-ter]").forEach(b=>b.onclick=()=>{state.tercero=+b.dataset.ter;refresh();});
 const sel=document.getElementById("nameSel");
 if(sel){sel.onchange=()=>{const w=document.getElementById("otroWrap");if(sel.value==="__otro"){w.style.display="block";state.nombre="";}else{w.style.display="none";state.nombre=sel.value;}refresh();};
  const otro=document.getElementById("otroName");if(otro)otro.oninput=()=>{state.nombre=otro.value;document.getElementById("next").disabled=!steps[state.step].valid();};
  const con=document.getElementById("contacto");if(con)con.oninput=()=>{state.contacto=con.value;};
 }
}
function refresh(){save();paint(false);}
document.getElementById("next").onclick=()=>{if(!steps[state.step].valid())return;if(state.step===steps.length-1){submit();return;}state.step++;save();paint(true);};
document.getElementById("back").onclick=()=>{if(state.step>0){state.step--;save();paint(true);}};

/* ---------- Envío ---------- */
function payload(){
 const f=finalists(),l=semiLosers();const nm=t=>t?t.name:"";
 return {nombre:state.nombre,contacto:state.contacto,comodin:nm(state.comodin),
  r16avos:winners(r32pairs(),state.r32).map(nm),
  octavos:state.r16.map((s,i)=>s==null?"":r16pairs()[i][s].name),
  cuartos:state.r8.map((s,i)=>s==null?"":r8pairs()[i][s].name),
  semis:finalists().map(nm),
  campeon:state.campeon!=null?nm(f[state.campeon]):"",subcampeon:state.campeon!=null?nm(f[state.campeon?0:1]):"",
  tercero:state.tercero!=null?nm(l[state.tercero]):"",cuarto:state.tercero!=null?nm(l[state.tercero?0:1]):"",ts:new Date().toISOString()};
}
async function submit(){
 appEl.innerHTML=`<div class="center"><div class="spin"></div><p>Enviando tu pronóstico…</p></div>`;
 document.getElementById("nav").style.display="none";
 try{
  await fetch(API_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload())});
  try{localStorage.removeItem(STORE)}catch(e){}
  appEl.innerHTML=`<div class="center"><div class="big">🏆</div><h1>¡Listo, ${state.nombre.split(' ')[0]}!</h1><p class="lead">Tu pronóstico de Fase 2 quedó registrado.</p><span class="pill">Cierre: mañana 1:00 PM</span><p class="hint" style="margin-top:20px">¿Te equivocaste? Vuelve a abrir este enlace y reenvía antes del cierre.</p><button class="btn prim" style="margin-top:24px;max-width:240px" onclick="location.reload()">Hacer otro / corregir</button></div>`;
 }catch(err){
  document.getElementById("nav").style.display="flex";
  appEl.innerHTML=`<div class="center"><div class="big">⚠️</div><h1>No se pudo enviar</h1><p class="lead">Revisa tu conexión e inténtalo de nuevo. Tus respuestas siguen guardadas.</p><button class="btn gold" style="margin-top:16px;max-width:240px" onclick="submit()">Reintentar envío</button></div>`;
 }
}
paint(true);
</script>
</body>
</html>
